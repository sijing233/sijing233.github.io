<span class="mobile btn-mobile-menu">
  <i class="icon icon-list btn-mobile-menu__icon"></i>
  <i class="icon icon-x-circle btn-mobile-close__icon hidden"></i>
</span>

<header class="panel-cover" style="background-image: url({{site.baseurl}}/images/cover.jpg)">
  <div class="panel-main">

    <div class="panel-main__inner panel-inverted">
    <div class="panel-main__content">
        <a href="{{ site.baseurl }}/" title="link to home of {{ site.title }}">
          <img src="{{ site.baseurl }}/images/profile.jpg" class="user-image" alt="My Profile Photo">
          <h1 class="panel-cover__title panel-title">{{ site.title }}</h1>
        </a>
        <hr class="panel-cover__divider">
        <p class="panel-cover__description">{{ site.description }}</p>
        <hr class="panel-cover__divider panel-cover__divider--secondary">

        <div class="navigation-wrapper">

          <nav class="cover-navigation cover-navigation--primary">
            <ul class="navigation">
              <li class="navigation__item"><a href="{{ site.baseurl }}/about" title="link to {{ site.title }} blog" class="blog-button">Abstract</a></li>
            </ul>
          </nav>

          <nav class="cover-navigation navigation--social">
            <ul class="navigation">
              <!-- GitHub -->
              <li class="navigation__item">
                <a href="https://www.github.com/sijing233" target="_blank">
                  <i class="iconfont">&#xe64a;</i>
                  <span class="label">GitHub</span>
                </a>
              </li>

              <!-- bilibili -->
              <li class="navigation__item">
                <a href="http://space.bilibili.com/181817188" target="_blank">
                  <i class="iconfont">&#xe75d;</i>
                  <span class="label">bilibili</span>
                </a>
              </li>

              <!-- Email -->
              <li class="navigation__item">
                <a href="mailto:{{ site.author.email }}" target="_blank">
                    <i class="iconfont">&#xe62d;</i>
                  <span class="label">Email</span>
                </a>
              </li>

            </ul>
          </nav>

        </div>

        <div>
            <nav class="cover-navigation cover-navigation--primary">
                <ul class="navigation">
                  <li class="navigation__enter__item"><a href="{{ site.baseurl }}/home" title="link to {{ site.title }} blog" class="blog-button">Enter Sijing233 Home</a></li>
                  <hr class="panel-cover__divider">
                </ul>
            </nav>
        </div>
      </div>

    </div>

    <div class="panel-cover--overlay"></div>
  </div>
</header>
